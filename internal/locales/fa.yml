help_owner: |
  👑 <b>فرمان‌های صاحب ربات</b>

  <i>ابزارهای اختصاصی برای مدیریت سودوها، اجرای کد سیستمی و انجام امن کارهای مدیریتی ربات.</i>

  <b>فرمان‌ها:</b>
  <blockquote>
  <b>/addsudo</b> - اضافه کردن کاربر جدید به لیست سودو
  <b>/delsudo</b> - حذف کاربر از لیست سودو
  <b>/blockuser</b> - جلوگیری از استفاده کاربر از ربات
  <b>/unblockuser</b> - اجازه دوباره به کاربر برای استفاده از ربات
  <b>/blockchat</b> - جلوگیری از استفاده چت از ربات
  <b>/unblockchat</b> - اجازه دوباره به چت برای استفاده از ربات
  <b>/blacklisted</b> - نمایش لیست سیاه سراسری
  <b>/eval</b> - اجرای تکه‌کد Go
  <b>/maintenance</b> — مدیریت حالت تعمیر و نگهداری ربات
  <b>/restart</b> — راه‌اندازی دوباره ربات
  <b>/sh</b> - اجرای فرمان‌های شل
  </blockquote>
help_sudo: |
  ⚡ <b>فرمان‌های سودو</b>

  <i>ابزارهای پیشرفته برای مدیریت رفتار ربات، بررسی عملکرد و کنترل لاگ و اتوماسیون.</i>

  <b>فرمان‌ها:</b>
  <blockquote>
  <b>/active</b> - نمایش تعداد کل چت‌های فعال
  <b>/autoleave</b> - فعال یا غیرفعال کردن خروج خودکار از چت
  <b>/logger</b> - فعال یا غیرفعال کردن لاگر
  <b>/stats</b> - نمایش آمار ربات و سیستم
  <b>/logs</b> - گرفتن لاگ‌های سیستم
  </blockquote>
help_admin: |
  🛠 <b>فرمان‌های ادمین</b>

  <i>ابزارهای کنترل موسیقی و پخش برای اینکه ادمین‌ها راحت‌تر پخش را مدیریت کنند.</i>

  <b>فرمان‌ها:</b>
  <blockquote>
  <b>/playmode</b> - کنترل اینکه چه کسانی بتوانند از /play استفاده کنند
  <b>/cplay</b> - پخش در ویس‌چت کانال لینک‌شده
  <b>/adminmode</b> - کنترل اینکه چه کسانی بتوانند از فرمان‌های ادمین استفاده کنند
  <b>/cmddelete</b> - فعال یا غیرفعال کردن حذف خودکار پیام‌های فرمان
  <b>/settings</b> - پیکربندی تنظیمات چت
  <b>/speed</b> - تغییر سرعت پخش
  <b>/skip</b> - رد کردن آهنگ فعلی
  <b>/pause</b> - متوقف کردن پخش فعلی
  <b>/resume</b> - ادامه دادن پخش متوقف‌شده
  <b>/replay</b> - پخش دوباره آهنگ فعلی
  <b>/mute</b> - بی‌صدا کردن پخش
  <b>/unmute</b> - برگرداندن صدا
  <b>/volume</b> - تنظیم صدای پخش (۰ تا ۱۰۰٪)
  <b>/seek</b> - جلو بردن پخش چند ثانیه
  <b>/seekback</b> - عقب بردن پخش چند ثانیه
  <b>/jump</b> - پریدن به یک زمان مشخص در آهنگ
  <b>/move</b> - جابه‌جا کردن آهنگِ صف به موقعیت دیگر
  <b>/clear</b> - پاک کردن همه آهنگ‌ها از صف
  <b>/remove</b> - حذف یک آهنگ مشخص از صف
  <b>/shuffle</b> - به‌هم‌زدن ترتیب همه آهنگ‌های صف
  <b>/loop</b> - فعال یا غیرفعال کردن لوپ
  <b>/stop</b> - توقف پخش و خروج از ویس‌چت
  <b>/nothumb</b> - فعال یا غیرفعال کردن نمایش کاور در پیام‌های پخش
  </blockquote>
help_public: |
  🌍 <b>فرمان‌های عمومی</b>

  <i>قابلیت‌هایی برای پخش آهنگ، دیدن صف، بررسی پینگ و گزارش باگ.</i>

  <b>فرمان‌ها:</b>
  <blockquote>
  <b>/play</b> - پخش یک آهنگ
  <b>/queue</b> - نمایش همه آهنگ‌های داخل صف
  <b>/ping</b> - بررسی تأخیر شبکه ربات
  <b>/start</b> - شروع ربات
  <b>/help</b> - نمایش منوی راهنما
  <b>/bug</b> - گزارش مشکل یا باگ
  <b>/position</b> - نمایش زمان فعلی آهنگ
  <b>/reload</b> - بارگذاری دوباره داده‌های ادمین یا کش
  <b>/json</b> - نمایش ساختار JSON پیام
  <b>/sudolist</b> - نمایش لیست سودوها
  </blockquote>
