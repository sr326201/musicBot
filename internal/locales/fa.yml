  تأخیر حذف خودکار بین 15m → 30m → 60m → 5m جابه‌جا می‌شود.
settings_info_cleanmode: |
  پیام‌های فرمان و سرویس ربات را بعد از یک تأخیر کوتاه به‌صورت خودکار حذف می‌کند.
  پیام‌های وضعیت پخش تا زمان انقضای طبیعی باقی می‌مانند.
